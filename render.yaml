services:
  - type: web
    name: alumnixhub
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: AlumnixHub
      - key: APP_BASE_URL
        value: https://alumnixhub.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_ENABLED
        value: "false"
      - key: SMTP_TLS
        value: "true"
