{% extends "base.html" %}
{% block content %}
<h4>Register</h4>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post">
  <div class="mb-2"><input class="form-control" name="full_name" placeholder="Full name"></div>
  <div class="mb-2"><input class="form-control" name="email" placeholder="Email"></div>
  <div class="mb-2"><input class="form-control" name="password" type="password" placeholder="Password"></div>
  <div class="mb-2">
    <select class="form-select" name="role">
      <option value="student">Student</option>
      <option value="alumni">Alumni</option>
      <option value="guest" selected>Guest</option>
    </select>
    <div class="form-text">Admin accounts are managed via admins.csv</div>
  </div>
  <button class="header-btn header-btn-primary w-100" style="margin-top: 18px; font-size: 1.15rem;" type="submit">Create account</button>
</form>
{% endblock %}
