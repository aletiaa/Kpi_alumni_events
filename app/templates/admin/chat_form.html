{% extends "base.html" %}{% block content %}<div class="card shadow-soft"><div class="card-body"><h4>{{ 'Редагувати чат' if link else 'Створити чат' }}</h4>{% if error is defined %}<div class="alert alert-danger">{{ error }}</div>{% endif %}<form method="post" action="{{ '/admin/chats/' ~ link.id ~ '/edit' if link else '/admin/chats/create' }}" class="row g-3"><div class="col-md-6"><label class="form-label">Назва</label><input class="form-control" name="title" value="{{ link.title if link else '' }}" required></div><div class="col-md-6"><label class="form-label">URL</label><input class="form-control" name="url" value="{{ link.url if link else '' }}" required></div><div class="col-12"><label class="form-label">Опис</label><textarea class="form-control" name="description" rows="3">{{ link.description if link else '' }}</textarea></div><div class="col-md-3"><label class="form-label">Факультет</label><input class="form-control" name="faculty" value="{{ link.faculty if link else '' }}"></div><div class="col-md-3"><label class="form-label">Спеціальність</label><input class="form-control" name="specialty" value="{{ link.specialty if link else '' }}"></div><div class="col-md-3"><label class="form-label">Група</label><input class="form-control" name="group_name" value="{{ link.group_name if link else '' }}"></div><div class="col-md-3"><label class="form-label">Рік випуску</label><input class="form-control" name="graduation_year" value="{{ link.graduation_year if link and link.graduation_year else '' }}"></div><div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" value="1" id="active" {% if not link or link.is_active %}checked{% endif %}><label class="form-check-label" for="active">Активно</label></div></div><div class="col-12"><button class="btn btn-primary">Зберегти</button><a href="/admin/chats" class="btn btn-outline-secondary">Скасувати</a></div></form></div></div>{% endblock %}
