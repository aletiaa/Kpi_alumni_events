{% extends "base.html" %}{% block content %}<div class="card shadow-soft"><div class="card-body"><h4>Додати питання</h4><form method="post" action="/admin/surveys/{{ survey.id }}/questions/create"><div class="mb-3"><label class="form-label">Текст питання</label><textarea class="form-control" name="question_text" rows="3" required></textarea></div><div class="mb-3"><label class="form-label">Тип питання</label><select class="form-select" name="question_type"><option value="text">Текст</option><option value="single_choice">Один варіант</option></select></div><div class="mb-3"><label class="form-label">Варіанти для вибору</label><textarea class="form-control" name="options_text" rows="5" placeholder="Один варіант на рядок"></textarea></div><button class="btn btn-primary">Зберегти питання</button><a class="btn btn-outline-secondary" href="/admin/surveys/{{ survey.id }}/questions">Скасувати</a></form></div></div>{% endblock %}
