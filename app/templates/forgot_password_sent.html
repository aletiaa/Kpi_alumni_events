{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <div class="card shadow-soft overflow-hidden">
      <div class="card-body p-4 text-center">
        <div class="section-title mb-2">Check your email</div>
        <div class="text-muted mb-3">
          If an account exists for that address, we sent a password reset link.
        </div>

        {% if demo_link is defined and demo_link %}
          <div class="alert alert-warning shadow-soft text-start">
            <div class="fw-bold mb-1">Demo link (email not available in this environment)</div>
            <div class="small"><a href="{{ demo_link }}">{{ demo_link }}</a></div>
          </div>
        {% endif %}

        <div class="d-flex justify-content-center gap-2 flex-wrap mt-3">
          <a class="btn btn-primary btn-lg" href="/login">Back to login</a>
          <a class="btn btn-outline-secondary btn-lg" href="/">Home</a>
        </div>
      </div>
    </div>

  </div>
</div>

{% endblock %}
