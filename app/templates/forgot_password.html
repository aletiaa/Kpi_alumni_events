{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <div class="card shadow-soft">
      <div class="card-body p-4">
        <div class="text-center mb-3">
          <div class="section-title mb-1">Reset password</div>
          <div class="text-muted">Enter your email to receive a reset link.</div>
        </div>

        {% if error is defined and error %}
          <div class="alert alert-danger shadow-soft">{{ error }}</div>
        {% endif %}

        <form method="post" action="/forgot-password">
          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input class="form-control form-control-lg" type="email" name="email" required
                   placeholder="you@example.com" value="{{ email if email is defined else '' }}">
          </div>

          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <a class="btn btn-outline-secondary" href="/login">Back</a>
            <button class="btn btn-gradient btn-lg" type="submit">Send reset link</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
