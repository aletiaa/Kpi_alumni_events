{% extends "base.html" %}{% block content %}<div class="card shadow-soft"><div class="card-body"><h4>{{ 'Редагувати опитування' if survey else 'Створити опитування' }}</h4><form method="post" action="{{ '/admin/surveys/' ~ survey.id ~ '/edit' if survey else '/admin/surveys/create' }}"><div class="mb-3"><label class="form-label">Назва</label><input class="form-control" name="title" value="{{ survey.title if survey else '' }}" required></div><div class="mb-3"><label class="form-label">Опис</label><textarea class="form-control" name="description" rows="4">{{ survey.description if survey else '' }}</textarea></div><div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_active" value="1" id="active" {% if not survey or survey.is_active %}checked{% endif %}><label class="form-check-label" for="active">Активно</label></div><button class="btn btn-primary">Зберегти</button><a href="/admin/surveys" class="btn btn-outline-secondary">Скасувати</a></form></div></div>{% endblock %}
