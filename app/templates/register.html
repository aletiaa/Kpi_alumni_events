{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center"><div class="col-12 col-md-8 col-lg-6"><div class="card shadow-soft"><div class="card-body p-4">
  <div class="kicker">Реєстрація</div><h2 class="section-title">Створити акаунт</h2>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" novalidate>
    <div class="mb-3"><label class="form-label">Повне ім'я</label><input class="form-control" name="full_name" placeholder="Ваше ім'я" value="{{ full_name if full_name is defined else '' }}" minlength="2" required><div class="invalid-feedback">Вкажіть ім'я щонайменше з 2 символів.</div></div>
    <div class="mb-3"><label class="form-label">Email</label><input class="form-control" name="email" type="email" placeholder="you@example.com" value="{{ email if email is defined else '' }}" required><div class="invalid-feedback">Вкажіть коректний email.</div></div>
    <div class="mb-3"><label class="form-label">Пароль</label><input class="form-control" name="password" type="password" placeholder="Мінімум 8 символів" minlength="8" required><div class="invalid-feedback">Пароль має містити щонайменше 8 символів.</div></div>
    <div class="mb-3"><label class="form-label">Роль</label><select class="form-select" name="role"><option value="student" {% if role == 'student' %}selected{% endif %}>Студент</option><option value="alumni" {% if role == 'alumni' %}selected{% endif %}>Випускник</option><option value="guest" {% if role is not defined or role == 'guest' %}selected{% endif %}>Гість</option></select><div class="form-text">Адміністратори керуються через admins.csv.</div></div>
    <button class="btn btn-primary w-100 btn-lg" type="submit">Створити акаунт</button>
  </form>
</div></div></div></div>
<script>(()=>{const form=document.querySelector('form');form.addEventListener('submit',e=>{if(!form.checkValidity()){e.preventDefault();e.stopPropagation();}form.classList.add('was-validated');});})();</script>
{% endblock %}
