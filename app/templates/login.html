{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center"><div class="col-12 col-md-8 col-lg-6"><div class="card shadow-soft"><div class="card-body p-4">
  <div class="text-center mb-3"><div class="kicker">Вхід</div><h2 class="section-title mb-1">Ласкаво просимо</h2><div class="text-muted">Увійдіть, щоб реєструватися на події та редагувати профіль.</div></div>
  {% if error is defined and error %}<div class="alert alert-danger shadow-soft">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <div class="mb-3"><label class="form-label fw-bold">Email</label><input class="form-control form-control-lg" type="email" name="email" required placeholder="you@example.com" value="{{ email if email is defined else '' }}"></div>
    <div class="mb-3"><label class="form-label fw-bold">Пароль</label><input class="form-control form-control-lg" type="password" name="password" required placeholder="Ваш пароль"></div>
    <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2"><a class="link-secondary" href="/forgot-password">Забули пароль?</a><button class="btn btn-primary btn-lg" type="submit">Увійти</button></div>
  </form><hr class="my-4"><div class="text-center"><div class="text-muted">Ще немає акаунта?</div><a class="btn btn-outline-primary mt-2" href="/register">Створити акаунт</a></div>
</div></div></div></div>
{% endblock %}
